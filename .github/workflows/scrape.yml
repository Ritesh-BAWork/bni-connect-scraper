name: BNI Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          BNI_EMAIL: ${{ secrets.BNI_EMAIL }}
          BNI_PASSWORD: ${{ secrets.BNI_PASSWORD }}
          BNI_CITIES: ${{ secrets.BNI_CITIES }}
          GOOGLE_WEBAPP_URL: ${{ secrets.GOOGLE_WEBAPP_URL }}
          HEADLESS: "true"
          SLOW_MO: "0"
          DEBUG_HTML: "false"
          CSV_FILE: "bni_members.csv"
        run: |
          python scraper.py

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: bni-members-csv
          path: bni_members.csv
