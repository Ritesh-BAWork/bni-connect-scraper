name: BNI Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"

permissions:
  contents: read
  actions: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Find previous successful run id
        id: previous_run
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          WORKFLOW_FILE: scrape.yml
          CURRENT_RUN_ID: ${{ github.run_id }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          token = os.environ["GH_TOKEN"]
          repo = os.environ["REPO"]
          workflow_file = os.environ["WORKFLOW_FILE"]
          current_run_id = int(os.environ["CURRENT_RUN_ID"])
          branch = os.environ["BRANCH_NAME"]

          url = f"https://api.github.com/repos/{repo}/actions/workflows/{workflow_file}/runs?branch={branch}&per_page=50"
          req = urllib.request.Request(
              url,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )

          run_id = ""
          try:
              with urllib.request.urlopen(req) as resp:
                  data = json.load(resp)

              for run in data.get("workflow_runs", []):
                  if run["id"] == current_run_id:
                      continue
                  if run.get("conclusion") == "success":
                      run_id = str(run["id"])
                      break
          except Exception as e:
              print(f"Could not query previous runs: {e}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"run_id={run_id}\n")

          print(f"Previous successful run id: {run_id or 'none'}")
          PY

      - name: Restore previous progress artifact
        if: steps.previous_run.outputs.run_id != ''
        uses: actions/download-artifact@v5
        with:
          name: bni-progress-v8
          path: .
          github-token: ${{ github.token }}
          run-id: ${{ steps.previous_run.outputs.run_id }}

      - name: Show restored files
        run: |
          echo "Workspace files:"
          ls -la
          if [ -f progress_state_v8.json ]; then
            echo "progress_state_v8.json restored"
          else
            echo "No previous progress_state_v8.json found"
          fi
          if [ -f bni_members_v8.csv ]; then
            echo "bni_members_v8.csv restored"
          else
            echo "No previous bni_members_v8.csv found"
          fi

      - name: Run scraper
        env:
          BNI_EMAIL: ${{ secrets.BNI_EMAIL }}
          BNI_PASSWORD: ${{ secrets.BNI_PASSWORD }}
          BNI_CITIES: ${{ secrets.BNI_CITIES }}
          GOOGLE_WEBAPP_URL: ${{ secrets.GOOGLE_WEBAPP_URL }}
          HEADLESS: "true"
          SLOW_MO: "0"
          DEBUG_HTML: "false"
          CSV_FILE: "bni_members_v8.csv"
          PROGRESS_FILE: "progress_state_v8.json"
          MAX_RUN_MINUTES: "330"
          SAFE_EXIT_BUFFER_SECONDS: "300"
          BATCH_SIZE: "25"
        run: |
          python scraper.py

      - name: Upload progress artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bni-progress-v8
          path: |
            progress_state_v8.json
            bni_members_v8.csv
          if-no-files-found: warn
          overwrite: true

      - name: Upload CSV artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bni-members-csv-v8
          path: bni_members_v8.csv
          if-no-files-found: warn
          overwrite: true
