name: BNI Scraper Mumbai

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          BNI_EMAIL: ${{ secrets.BNI_EMAIL }}
          BNI_PASSWORD: ${{ secrets.BNI_PASSWORD }}
          GOOGLE_WEBAPP_URL: ${{ secrets.GOOGLE_WEBAPP_URL }}
          HEADLESS: "true"
          SLOW_MO: "0"
          DEBUG_HTML: "false"
          CSV_FILE: "mumbai_bni_members.csv"
          BATCH_SIZE: "10"
        run: |
          python scraper.py

      - name: Upload CSV artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mumbai-bni-members-csv
          path: mumbai_bni_members.csv
          if-no-files-found: warn
          overwrite: true
